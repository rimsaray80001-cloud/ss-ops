<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #23AD4A; --primary-hover: #1e913e; --primary-light: #e8f5e9;
            --danger: #ef5350; --info: #2196f3; --bg: #f8f9fa;
            --text-main: #202124; --text-muted: #5f6368; --border: #dadce0;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: var(--bg); color: var(--text-main); display: flex; overflow: hidden; letter-spacing: 0.2px; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: #fff; height: 100vh; position: fixed; border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 32px 24px; font-weight: 600; color: var(--primary); font-size: 1.25rem; border-bottom: 1px solid #f1f3f4; }
        .menu { list-style: none; padding: 16px; flex-grow: 1; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; color: var(--text-muted); transition: 0.2s; }
        .menu-item svg { width: 20px; height: 20px; fill: currentColor; }
        .menu-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }

        /* Main Content */
        .main-content { margin-left: var(--sidebar-width); flex: 1; height: 100vh; overflow-y: auto; }
        .top-navbar { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 90; }
        .view-container { padding: 30px 40px; }
        .view-section { display: none; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.3s ease-out; }
        .view-section.active { display: block; }

        /* Dashboard & UI */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .stat-card { background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .stat-card .value { font-size: 2.1rem; font-weight: 600; }
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; }
        .chart-card { background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border); }

        /* Bars */
        .bar-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .bar-label { width: 120px; font-size: 0.85rem; color: var(--text-muted); }
        .bar-track { flex: 1; background: #f1f3f4; height: 8px; border-radius: 4px; }
        .bar-fill { background: var(--primary); height: 100%; border-radius: 4px; transition: width 0.8s ease; }
        .bar-value { width: 85px; font-size: 0.85rem; font-weight: 600; text-align: right; }

        /* Table */
        .card { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 18px 24px; background: #f8f9fa; border-bottom: 1px solid var(--border); font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        td { padding: 18px 24px; border-bottom: 1px solid #f1f3f4; font-size: 0.9rem; }

        /* Modal & Buttons */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(32, 33, 36, 0.6); backdrop-filter: blur(2px); }
        .modal-content { background: white; margin: 40px auto; width: 680px; border-radius: 16px; box-shadow: 0 24px 38px rgba(0,0,0,0.14); overflow: hidden; }
        .modal-header { padding: 20px 32px; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-sub-link { color: var(--info); font-size: 0.75rem; cursor: pointer; text-decoration: underline; background: none; border: none; margin-top: 8px; font-weight: 600; }
        .btn-circle { width: 32px; height: 32px; border-radius: 6px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-edit { background: #e3f2fd; color: var(--info); } .btn-delete { background: #ffebee; color: var(--danger); }

        input, select { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.95rem; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">Shop Axiata</div>
        <ul class="menu">
            <li class="menu-item active" onclick="switchTab('dashboard', this)">
                <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Dashboard
            </li>
            <li class="menu-item" onclick="switchTab('top-up', this)">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14h-2V9h-2V7h4v10z"/></svg> History
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="top-navbar">
            <div id="page-title-display" style="font-size:1.6rem; font-weight:600">Dashboard Overview</div>
            <button class="btn-action" onclick="openModal()">
                <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> New Top Up
            </button>
        </div>

        <div class="view-container">
            <section id="dashboard" class="view-section active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="label"><span id="rev-month-label">This Month</span> Revenue</div>
                        <div class="value" id="dash-rev">$0.00</div>
                        <button class="btn-sub-link" id="toggle-rev-btn" onclick="toggleRevenueMonth()">View Previous Month →</button>
                    </div>
                    <div class="stat-card"><div class="label">Total Records</div><div class="value" id="dash-count">0</div></div>
                    <div class="stat-card">
                        <div class="label">Expiring (7 Days)</div><div class="value" id="dash-alert" style="color:var(--danger)">0</div>
                        <button class="btn-sub-link" onclick="openExpiryList()">View Details →</button>
                    </div>
                </div>
                <div class="charts-container">
                    <div class="chart-card"><h4>Revenue by Tariff Plan</h4><div id="tariff-chart"></div></div>
                    <div class="chart-card"><h4>Agent Performance</h4><div id="agent-chart"></div></div>
                </div>
            </section>

            <section id="top-up" class="view-section">
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Agent</th><th>Customer</th><th>Service No.</th><th>Plan</th><th>Amount</th><th>Expiry</th><th style="text-align:right">Action</th></tr>
                        </thead>
                        <tbody id="topup-body"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="topupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span id="modalTitle">New Entry</span><span style="cursor:pointer" onclick="closeModal()">&times;</span></div>
            <form id="modal-form" style="padding: 32px">
                <input type="hidden" id="editIndex" value="-1">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                    <div><label>Agent</label><select id="agent"><option>RIM Saray</option><option>KUN Chamnan</option></select></div>
                    <div><label>Customer</label><input type="text" id="custName" required></div>
                    <div><label>Number</label><input type="text" id="topupNum" required></div>
                    <div><label>Contact</label><input type="text" id="contact" required></div>
                    <div><label>Plan</label>
                        <select id="tariff">
                            <option>Smart@Home</option><option>Fiber</option><option>M2M</option>
                            <option>Postpaid</option><option>Smart Loar</option><option>Smart Data Tamchet</option>
                        </select>
                    </div>
                    <div><label>Amount ($)</label><input type="number" id="amount" step="0.01" required></div>
                    <div><label>Top Up Date</label><input type="date" id="renewDate" onchange="calculateExpiry()" required></div>
                    <div><label>Duration (Months)</label><input type="number" id="period" value="1" min="1" oninput="calculateExpiry()"></div>
                </div>
                <div><label>Calculated Expiry</label><input type="date" id="expireDate" readonly style="background:#f1f3f4; font-weight:600"></div>
                <div style="display:flex; gap:10px; margin-top:20px">
                    <button type="button" class="btn-action" style="flex:2; justify-content:center" onclick="saveTransaction()">Save Record</button>
                    <button type="button" class="btn-action" style="flex:1; background:#eee; color:#666; justify-content:center" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="expiryListModal" class="modal">
        <div class="modal-content" style="width: 500px;">
            <div class="modal-header"><span>Upcoming Expirations</span><span style="cursor:pointer" onclick="closeExpiryList()">&times;</span></div>
            <div id="expiry-list-content" style="padding: 24px"></div>
        </div>
    </div>

    <script>
        let transactions = [];
        let showCurrentMonth = true;

        window.onload = () => {
            google.script.run.withSuccessHandler(data => {
                transactions = data;
                updateUI();
                updateDashboard();
            }).getTransactionsFromSheet();
        };

        function saveTransaction() {
            const index = parseInt(document.getElementById('editIndex').value);
            const data = {
                agent: document.getElementById('agent').value,
                customer: document.getElementById('custName').value,
                number: document.getElementById('topupNum').value,
                contact: document.getElementById('contact').value,
                plan: document.getElementById('tariff').value,
                amount: document.getElementById('amount').value,
                renew: document.getElementById('renewDate').value,
                period: document.getElementById('period').value,
                expire: document.getElementById('expireDate').value
            };
            google.script.run.withSuccessHandler(newData => {
                transactions = newData;
                closeModal();
                updateUI();
                updateDashboard();
            }).saveToSheet(data, index);
        }

        function deleteTransaction(index) {
            if (confirm("Delete this record permanently?")) {
                google.script.run.withSuccessHandler(newData => {
                    transactions = newData;
                    updateUI();
                    updateDashboard();
                }).deleteFromSheet(index);
            }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(id).classList.add('active');
            document.getElementById('page-title-display').innerText = id === 'dashboard' ? "Dashboard Overview" : "Transaction History";
            if(id === 'dashboard') updateDashboard();
        }

        function calculateExpiry() {
            const rd = document.getElementById('renewDate').value;
            const p = parseInt(document.getElementById('period').value) || 0;
            if (rd && p > 0) {
                const date = new Date(rd);
                date.setDate(date.getDate() + (p * 30));
                document.getElementById('expireDate').value = date.toISOString().split('T')[0];
            }
        }

        function toggleRevenueMonth() {
            showCurrentMonth = !showCurrentMonth;
            document.getElementById('rev-month-label').innerText = showCurrentMonth ? "This Month" : "Previous Month";
            document.getElementById('toggle-rev-btn').innerText = showCurrentMonth ? "View Previous Month →" : "View This Month →";
            updateDashboard();
        }

        function updateUI() {
            const tbody = document.getElementById('topup-body');
            tbody.innerHTML = '';
            const now = new Date();
            const limit = new Date(); limit.setDate(now.getDate() + 7);

            transactions.forEach((t, i) => {
                const isNear = new Date(t.expire) >= now && new Date(t.expire) <= limit;
                tbody.innerHTML += `
                    <tr><td>${t.agent}</td><td><b>${t.customer}</b><br><small style="color:var(--text-muted)">${t.contact}</small></td><td>${t.number}</td>
                    <td><span style="background:var(--primary-light); color:var(--primary); padding:4px 8px; border-radius:6px; font-size:0.75rem; font-weight:600">${t.plan}</span></td>
                    <td style="font-weight:600;">$${parseFloat(t.amount).toFixed(2)}</td>
                    <td style="color:${isNear ? 'var(--danger)' : 'inherit'}; font-weight:${isNear?600:400}">${t.expire}</td>
                    <td style="text-align:right"><div style="display:flex;gap:8px;justify-content:flex-end">
                        <button class="btn-circle btn-edit" onclick="openModal(${i})">✎</button>
                        <button class="btn-circle btn-delete" onclick="deleteTransaction(${i})">✖</button>
                    </div></td></tr>`;
            });
        }

        function updateDashboard() {
            let revSum = 0, alertCount = 0;
            const now = new Date();
            const limit = new Date(); limit.setDate(now.getDate() + 7);
            const tMap = {}, aMap = {};

            transactions.forEach(t => {
                const tDate = new Date(t.renew);
                const isCurrent = tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
                const isPrev = tDate.getMonth() === (now.getMonth() === 0 ? 11 : now.getMonth() - 1);
                const amt = parseFloat(t.amount) || 0;
                if (showCurrentMonth && isCurrent) revSum += amt;
                if (!showCurrentMonth && isPrev) revSum += amt;
                if (new Date(t.expire) >= now && new Date(t.expire) <= limit) alertCount++;
                tMap[t.plan] = (tMap[t.plan] || 0) + amt;
                aMap[t.agent] = (aMap[t.agent] || 0) + 1;
            });

            document.getElementById('dash-rev').innerText = `$${revSum.toFixed(2)}`;
            document.getElementById('dash-count').innerText = transactions.length;
            document.getElementById('dash-alert').innerText = alertCount;
            renderChart('tariff-chart', tMap, true);
            renderChart('agent-chart', aMap, false);
        }

        function renderChart(id, data, is$ ) {
            const cont = document.getElementById(id); cont.innerHTML = '';
            const max = Math.max(...Object.values(data), 1);
            Object.entries(data).forEach(([lbl, val]) => {
                const pct = (val / max) * 100;
                cont.innerHTML += `<div class="bar-row"><div class="bar-label">${lbl}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-value">${is$? '$'+val.toFixed(2):val+' Tx'}</div></div>`;
            });
        }

        function openModal(i = -1) {
            document.getElementById('modal-form').reset();
            document.getElementById('editIndex').value = i;
            if (i > -1) {
                const t = transactions[i];
                document.getElementById('agent').value = t.agent; document.getElementById('custName').value = t.customer;
                document.getElementById('topupNum').value = t.number; document.getElementById('contact').value = t.contact;
                document.getElementById('tariff').value = t.plan; document.getElementById('amount').value = t.amount;
                document.getElementById('renewDate').value = t.renew; document.getElementById('period').value = t.period;
                document.getElementById('expireDate').value = t.expire;
            }
            document.getElementById('topupModal').style.display = 'block';
        }
        function closeModal() { document.getElementById('topupModal').style.display = 'none'; }
        function openExpiryList() {
            const now = new Date(); const limit = new Date(); limit.setDate(now.getDate() + 7);
            const list = transactions.filter(t => new Date(t.expire) >= now && new Date(t.expire) <= limit);
            const cont = document.getElementById('expiry-list-content');
            cont.innerHTML = list.length === 0 ? '<p>None</p>' : list.map(t => `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee"><div><b>${t.customer}</b><br><small>${t.number}</small></div><div style="color:var(--danger);font-weight:600">${t.expire}</div></div>`).join('');
            document.getElementById('expiryListModal').style.display = 'block';
        }
        function closeExpiryList() { document.getElementById('expiryListModal').style.display = 'none'; }
    </script>
</body>
</html>
